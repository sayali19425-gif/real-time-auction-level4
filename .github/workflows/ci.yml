name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Find and build frontend
        run: |
          find . -name "package.json" -not -path "*/node_modules/*" -maxdepth 5
          cd $(find . -name "vite.config.js" -not -path "*/node_modules/*" | head -1 | xargs dirname)
          npm ci
          npm run build