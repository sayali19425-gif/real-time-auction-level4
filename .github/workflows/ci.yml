name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: real-time-auction/auction-dapp/frontend
        run: npm ci

      - name: Build
        working-directory: real-time-auction/auction-dapp/frontend
        run: npm run build

  build-contracts:
    name: Build Soroban Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build AuctionToken
        working-directory: real-time-auction/auction-dapp/contract/auction_token
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Build AuctionBid v2
        working-directory: real-time-auction/auction-dapp/contract/auction_bid_v2
        run: cargo build --target wasm32-unknown-unknown --release